<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0d0d0d;
      --bg-panel: #141414;
      --bg-hover: #1a1a1a;
      --bg-active: #242424;
      --border: #2a2a2a;
      --text: #e5e5e5;
      --text-dim: #666;
      --text-muted: #444;
      --accent: #d97706;
      --high: #dc2626;
      --normal: #d97706;
      --new: #059669;
      --pending: #6366f1;
      --folder: #e5a000;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      font-size: 13px;
    }
    
    .layout {
      display: flex;
      height: 100vh;
    }
    
    /* Sidebar */
    .sidebar {
      width: 240px;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    
    .sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .sidebar-header .role {
      font-weight: 400;
      color: var(--accent);
      text-transform: none;
    }
    
    .tree {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    
    .tree-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      transition: background 0.15s;
    }
    
    .tree-item:hover {
      background: var(--bg-hover);
    }
    
    .tree-item.active {
      background: var(--bg-active);
    }
    
    .tree-item .icon {
      width: 16px;
      text-align: center;
      font-size: 12px;
    }
    
    .tree-item .name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .tree-item .count {
      color: var(--text-muted);
      font-size: 11px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    
    .tree-children {
      margin-left: 16px;
      border-left: 1px solid var(--border);
      padding-left: 4px;
    }
    
    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
    }
    
    .search-box {
      flex: 1;
      max-width: 400px;
      position: relative;
    }
    
    .search-box input {
      width: 100%;
      padding: 6px 10px 6px 28px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    
    .search-box input:focus {
      border-color: var(--accent);
    }
    
    .search-box::before {
      content: "🔍";
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      opacity: 0.5;
    }
    
    .search-hint {
      font-size: 11px;
      color: var(--text-muted);
    }
    
    .search-hint kbd {
      background: var(--bg-active);
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 10px;
    }
    
    .breadcrumb {
      color: var(--text-dim);
      font-size: 12px;
    }
    
    .breadcrumb span {
      color: var(--text);
    }
    
    /* Table */
    .table-container {
      flex: 1;
      overflow: auto;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    
    thead {
      position: sticky;
      top: 0;
      background: var(--bg-panel);
      z-index: 10;
    }
    
    th {
      text-align: left;
      padding: 8px 12px;
      font-weight: 500;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    
    td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    
    tr:hover td {
      background: var(--bg-hover);
    }
    
    tr.selected td {
      background: var(--bg-active);
    }
    
    .col-badge { width: 50px; text-align: center; }
    .col-content { min-width: 300px; }
    .col-category { width: 100px; }
    .col-tags { width: 150px; }
    .col-date { width: 100px; }
    .col-meta { width: 80px; }
    
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
    }
    
    .badge.high { background: var(--high); color: white; }
    .badge.normal { background: var(--normal); color: white; }
    .badge.new { background: var(--new); color: white; }
    .badge.pending { background: var(--pending); color: white; }
    .badge.other { background: #4b5563; color: white; }
    
    .content-cell {
      line-height: 1.6;
      max-width: 600px;
    }
    
    .content-cell .match {
      background: rgba(217, 119, 6, 0.3);
      padding: 0 2px;
      border-radius: 2px;
    }
    
    .tag {
      display: inline-block;
      padding: 2px 6px;
      background: var(--bg-active);
      border-radius: 3px;
      font-size: 10px;
      color: var(--text-dim);
      margin-right: 4px;
      margin-bottom: 2px;
    }
    
    .category {
      font-size: 11px;
      color: var(--text-dim);
    }
    
    .date, .meta {
      font-size: 11px;
      color: var(--text-muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    
    .dim { color: var(--text-dim); }
    .muted { color: var(--text-muted); }
    
    .empty {
      text-align: center;
      padding: 60px;
      color: var(--text-dim);
    }
    
    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: slideUp 0.3s ease;
      z-index: 1000;
    }
    
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span>Explorer</span>
        <span class="role">{{roleName}}</span>
      </div>
      <div class="tree" id="tree"></div>
    </aside>
    
    <main class="main">
      <div class="toolbar">
        <div class="breadcrumb" id="breadcrumb">Memories / <span>All</span></div>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Filter... (regex: /pattern/)" autocomplete="off">
        </div>
        <div class="search-hint">
          <kbd>/</kbd> search <kbd>j/k</kbd> nav <kbd>c</kbd> copy <kbd>esc</kbd> clear
        </div>
      </div>
      
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th class="col-badge"></th>
              <th class="col-content">Content</th>
              <th class="col-category">Category</th>
              <th class="col-tags">Tags</th>
              <th class="col-date">Date</th>
              <th class="col-meta">Meta</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    const DATA = {{data}};
    DATA.pending = DATA.pending || [];
    
    // Flatten items
    const ITEMS = [];
    DATA.learnings.forEach(i => ITEMS.push({ ...i, type: 'learning', priority: i.used >= 3 ? 'high' : i.used === 0 ? 'new' : 'normal' }));
    DATA.preferences.forEach(i => ITEMS.push({ ...i, type: 'preference', priority: 'other' }));
    DATA.events.forEach(i => ITEMS.push({ ...i, type: 'event', priority: 'other' }));
    DATA.daily.forEach(i => ITEMS.push({ ...i, type: 'daily', priority: 'other' }));
    DATA.pending.forEach(i => ITEMS.push({ ...i, type: 'pending', priority: 'pending' }));
    
    // Build tree
    const TREE = { name: 'Memories', path: '/', count: ITEMS.length, children: [], type: 'folder' };
    
    const learnings = ITEMS.filter(i => i.type === 'learning');
    if (learnings.length) {
      const node = { name: '📚 Learnings', path: '/learnings', count: learnings.length, children: [], type: 'folder' };
      const high = learnings.filter(i => i.priority === 'high');
      const normal = learnings.filter(i => i.priority === 'normal');
      const newItems = learnings.filter(i => i.priority === 'new');
      if (high.length) node.children.push({ name: '🔴 High', path: '/learnings/high', count: high.length, items: high, type: 'folder' });
      if (normal.length) node.children.push({ name: '🟡 Normal', path: '/learnings/normal', count: normal.length, items: normal, type: 'folder' });
      if (newItems.length) node.children.push({ name: '🟢 New', path: '/learnings/new', count: newItems.length, items: newItems, type: 'folder' });
      TREE.children.push(node);
    }
    
    const prefs = ITEMS.filter(i => i.type === 'preference');
    if (prefs.length) {
      const node = { name: '⚙️ Preferences', path: '/preferences', count: prefs.length, children: [], type: 'folder' };
      const byCat = {};
      prefs.forEach(p => { const c = p.category || 'General'; byCat[c] = byCat[c] || []; byCat[c].push(p); });
      Object.entries(byCat).forEach(([cat, items]) => {
        node.children.push({ name: cat, path: `/preferences/${cat.toLowerCase()}`, count: items.length, items, type: 'folder' });
      });
      TREE.children.push(node);
    }
    
    const events = ITEMS.filter(i => i.type === 'event');
    if (events.length) {
      TREE.children.push({ name: '📅 Events', path: '/events', count: events.length, items: events, type: 'folder' });
    }
    
    const daily = ITEMS.filter(i => i.type === 'daily');
    if (daily.length) {
      const node = { name: '📝 Daily', path: '/daily', count: daily.length, children: [], type: 'folder' };
      const byDate = {};
      daily.forEach(d => { byDate[d.date] = byDate[d.date] || []; byDate[d.date].push(d); });
      Object.entries(byDate).sort((a, b) => b[0].localeCompare(a[0])).forEach(([date, items]) => {
        node.children.push({ name: date, path: `/daily/${date}`, count: items.length, items, type: 'folder' });
      });
      TREE.children.push(node);
    }
    
    const pending = ITEMS.filter(i => i.type === 'pending');
    if (pending.length) {
      const node = { name: '⏳ Pending', path: '/pending', count: pending.length, children: [], type: 'folder' };
      const promoted = pending.filter(i => i.promoted);
      const waiting = pending.filter(i => !i.promoted);
      if (promoted.length) node.children.push({ name: '✓ Promoted', path: '/pending/promoted', count: promoted.length, items: promoted, type: 'folder' });
      if (waiting.length) node.children.push({ name: '○ Waiting', path: '/pending/waiting', count: waiting.length, items: waiting, type: 'folder' });
      TREE.children.push(node);
    }
    
    let currentPath = '/';
    let searchQuery = '';
    let selectedIndex = 0;
    let filteredItems = [];
    
    function renderTree(node, container, level = 0) {
      const div = document.createElement('div');
      
      const item = document.createElement('div');
      item.className = 'tree-item';
      item.style.paddingLeft = (8 + level * 12) + 'px';
      item.dataset.path = node.path;
      
      const icon = node.type === 'folder' ? '📁' : '📄';
      
      item.innerHTML = `
        <span class="icon">${icon}</span>
        <span class="name">${node.name}</span>
        <span class="count">${node.count}</span>
      `;
      
      item.onclick = () => {
        currentPath = node.path;
        document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
        item.classList.add('active');
        updateBreadcrumb(node.path);
        renderTable();
      };
      
      div.appendChild(item);
      
      if (node.children && node.children.length) {
        const children = document.createElement('div');
        children.className = 'tree-children';
        node.children.forEach(child => renderTree(child, children, level + 1));
        div.appendChild(children);
      }
      
      container.appendChild(div);
    }
    
    function updateBreadcrumb(path) {
      const parts = path.split('/').filter(p => p);
      let html = '<span>Memories</span>';
      parts.forEach((p, i) => html += ' / ' + (i === parts.length - 1 ? `<span>${p}</span>` : p));
      document.getElementById('breadcrumb').innerHTML = html;
    }
    
    function renderTable() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      
      filteredItems = ITEMS.filter(i => {
        if (currentPath !== '/') {
          const itemPath = i.type === 'learning' ? `/learnings/${i.priority}`
                        : i.type === 'preference' ? `/preferences/${(i.category || 'general').toLowerCase()}`
                        : i.type === 'event' ? '/events'
                        : i.type === 'daily' ? `/daily/${i.date}`
                        : `/pending/${i.promoted ? 'promoted' : 'waiting'}`;
          if (itemPath !== currentPath && !itemPath.startsWith(currentPath + '/')) return false;
        }
        if (searchQuery) {
          const text = i.text.toLowerCase();
          const tags = (i.tags || []).join(' ').toLowerCase();
          try {
            if (searchQuery.startsWith('/') && searchQuery.endsWith('/')) {
              const re = new RegExp(searchQuery.slice(1, -1), 'i');
              if (!re.test(text) && !re.test(tags)) return false;
            } else if (!text.includes(searchQuery) && !tags.includes(searchQuery)) {
              return false;
            }
          } catch(e) {
            if (!text.includes(searchQuery)) return false;
          }
        }
        return true;
      });
      
      if (!filteredItems.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty"><div class="empty-icon">📭</div>No items found</td></tr>';
        return;
      }
      
      selectedIndex = 0;
      filteredItems.forEach((item, idx) => {
        const tr = document.createElement('tr');
        tr.dataset.index = idx;
        
        let content = escapeHtml(item.text);
        if (searchQuery) {
          try {
            if (searchQuery.startsWith('/') && searchQuery.endsWith('/')) {
              content = content.replace(new RegExp('(' + searchQuery.slice(1, -1) + ')', 'gi'), '<span class="match">$1</span>');
            } else {
              content = content.replace(new RegExp('(' + escapeRegExp(searchQuery) + ')', 'gi'), '<span class="match">$1</span>');
            }
          } catch(e) {}
        }
        
        const badgeClass = item.priority || 'other';
        const badgeText = item.type === 'learning' ? `${item.used || 0}x` : item.type === 'pending' ? (item.promoted ? '✓' : '○') : item.type.slice(0, 3);
        
        tr.innerHTML = `
          <td class="col-badge"><span class="badge ${badgeClass}">${badgeText}</span></td>
          <td class="col-content"><div class="content-cell">${content}</div></td>
          <td class="col-category"><span class="category">${item.category || ''}</span></td>
          <td class="col-tags">${(item.tags || []).map(t => `<span class="tag">#${t}</span>`).join('')}</td>
          <td class="col-date"><span class="date">${item.date || item.createdAt || ''}</span></td>
          <td class="col-meta"><span class="meta">${item.source || ''}</span></td>
        `;
        
        tr.onclick = () => {
          document.querySelectorAll('tr.selected').forEach(r => r.classList.remove('selected'));
          tr.classList.add('selected');
          selectedIndex = idx;
        };
        
        tbody.appendChild(tr);
      });
      
      if (filteredItems.length) {
        tbody.querySelector('tr').classList.add('selected');
      }
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }
    
    function navigate(dir) {
      if (!filteredItems.length) return;
      selectedIndex = Math.max(0, Math.min(filteredItems.length - 1, selectedIndex + dir));
      const row = document.querySelector(`tr[data-index="${selectedIndex}"]`);
      if (row) {
        document.querySelectorAll('tr.selected').forEach(r => r.classList.remove('selected'));
        row.classList.add('selected');
        row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }
    
    function copySelected() {
      const item = filteredItems[selectedIndex];
      if (!item) return;
      navigator.clipboard.writeText(item.text);
      showToast('📋 Copied to clipboard');
    }
    
    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<span>${msg}</span>`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }
    
    // Init
    renderTree(TREE, document.getElementById('tree'));
    renderTable();
    
    // Events
    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value.toLowerCase();
      renderTable();
    });
    
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') {
        if (e.key === 'Escape') { e.target.value = ''; e.target.blur(); searchQuery = ''; renderTable(); }
        return;
      }
      switch(e.key) {
        case '/': e.preventDefault(); document.getElementById('searchInput').focus(); break;
        case 'j': navigate(1); break;
        case 'k': navigate(-1); break;
        case 'c': copySelected(); break;
        case 'Escape': currentPath = '/'; document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active')); renderTable(); break;
      }
    });
  </script>
</body>
</html>
