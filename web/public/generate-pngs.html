<!DOCTYPE html>
<html>
<head><title>PNG Generator</title></head>
<body>
<canvas id="c"></canvas>
<script>
// Open this file in a browser, then run generate() in console
// It will trigger downloads for each PNG size
const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="url(#grad)" stroke-width="1.5" opacity="0.95"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.4"/>
  <circle cx="32" cy="30" r="5" fill="url(#grad)" opacity="0.9"/>
  <circle cx="22" cy="20" r="3.5" fill="url(#grad)" opacity="0.7"/>
  <circle cx="42" cy="20" r="3.5" fill="url(#grad2)" opacity="0.7"/>
  <circle cx="19" cy="38" r="3" fill="url(#grad2)" opacity="0.6"/>
  <circle cx="45" cy="38" r="3" fill="url(#grad)" opacity="0.6"/>
  <circle cx="32" cy="46" r="2.5" fill="url(#grad2)" opacity="0.55"/>
  <line x1="32" y1="30" x2="22" y2="20" stroke="url(#grad)" stroke-width="0.8" opacity="0.5"/>
  <line x1="32" y1="30" x2="42" y2="20" stroke="url(#grad2)" stroke-width="0.8" opacity="0.5"/>
  <line x1="32" y1="30" x2="19" y2="38" stroke="url(#grad2)" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="30" x2="45" y2="38" stroke="url(#grad)" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="30" x2="32" y2="46" stroke="url(#grad2)" stroke-width="0.8" opacity="0.35"/>
  <line x1="22" y1="20" x2="42" y2="20" stroke="url(#grad)" stroke-width="0.5" opacity="0.25"/>
  <line x1="22" y1="20" x2="19" y2="38" stroke="url(#grad)" stroke-width="0.5" opacity="0.2"/>
  <line x1="42" y1="20" x2="45" y2="38" stroke="url(#grad2)" stroke-width="0.5" opacity="0.2"/>
  <line x1="19" y1="38" x2="32" y2="46" stroke="url(#grad2)" stroke-width="0.5" opacity="0.2"/>
  <line x1="45" y1="38" x2="32" y2="46" stroke="url(#grad)" stroke-width="0.5" opacity="0.2"/>
</svg>`;

async function generate() {
  const sizes = [
    { name: 'favicon-16.png', size: 16 },
    { name: 'favicon-32.png', size: 32 },
    { name: 'apple-touch-icon.png', size: 180 },
  ];
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  for (const { name, size } of sizes) {
    canvas.width = size;
    canvas.height = size;
    const img = new Image();
    const blob = new Blob([svgStr], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    await new Promise(r => { img.onload = r; img.src = url; });
    ctx.clearRect(0, 0, size, size);
    ctx.drawImage(img, 0, 0, size, size);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = name;
    a.href = canvas.toDataURL('image/png');
    a.click();
    await new Promise(r => setTimeout(r, 300));
  }
  console.log('Done! Check your downloads folder.');
}
</script>
<p>Open console, run <code>generate()</code> to download PNGs.</p>
</body>
</html>
