<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="url(#grad)" stroke-width="1.5" opacity="0.95"/>
  <!-- Outer ring (persona boundary) -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#grad)" stroke-width="1.2" opacity="0.4"/>
  <!-- Central node (core identity) -->
  <circle cx="32" cy="30" r="5" fill="url(#grad)" opacity="0.9"/>
  <!-- Memory node - top left -->
  <circle cx="22" cy="20" r="3.5" fill="url(#grad)" opacity="0.7"/>
  <!-- Knowledge node - top right -->
  <circle cx="42" cy="20" r="3.5" fill="url(#grad2)" opacity="0.7"/>
  <!-- Role node - bottom left -->
  <circle cx="19" cy="38" r="3" fill="url(#grad2)" opacity="0.6"/>
  <!-- Vector node - bottom right -->
  <circle cx="45" cy="38" r="3" fill="url(#grad)" opacity="0.6"/>
  <!-- Experience node - bottom center -->
  <circle cx="32" cy="46" r="2.5" fill="url(#grad2)" opacity="0.55"/>
  <!-- Connection lines (knowledge graph) -->
  <line x1="32" y1="30" x2="22" y2="20" stroke="url(#grad)" stroke-width="0.8" opacity="0.5"/>
  <line x1="32" y1="30" x2="42" y2="20" stroke="url(#grad2)" stroke-width="0.8" opacity="0.5"/>
  <line x1="32" y1="30" x2="19" y2="38" stroke="url(#grad2)" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="30" x2="45" y2="38" stroke="url(#grad)" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="30" x2="32" y2="46" stroke="url(#grad2)" stroke-width="0.8" opacity="0.35"/>
  <!-- Cross connections (memory recall paths) -->
  <line x1="22" y1="20" x2="42" y2="20" stroke="url(#grad)" stroke-width="0.5" opacity="0.25"/>
  <line x1="22" y1="20" x2="19" y2="38" stroke="url(#grad)" stroke-width="0.5" opacity="0.2"/>
  <line x1="42" y1="20" x2="45" y2="38" stroke="url(#grad2)" stroke-width="0.5" opacity="0.2"/>
  <line x1="19" y1="38" x2="32" y2="46" stroke="url(#grad2)" stroke-width="0.5" opacity="0.2"/>
  <line x1="45" y1="38" x2="32" y2="46" stroke="url(#grad)" stroke-width="0.5" opacity="0.2"/>
</svg>
